name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Run tests
        run: npm test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-web-cli-build
          path: |
            desktop/dist-renderer/**
            scripts/launch-web.js
            scripts/launch.js
            server/**
          if-no-files-found: error

  # 构建完成后创建 release 并上传 Linux Web/CLI 产物
  release:
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on stable
        id: check
        run: |
          if git branch -r --contains "${{ github.ref_name }}" | grep -q 'origin/stable'; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.check.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/**/*dist-renderer*/**
            artifacts/**/*launch-web.js
            artifacts/**/*launch.js
